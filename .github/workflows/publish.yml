name: Publish to npm

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: "Version to publish (e.g., 1.0.0)"
        required: false
        type: string

jobs:
  meta:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.meta.outputs.version }}
      tag: ${{ steps.meta.outputs.tag }}
    steps:
      - name: Determine version
        id: meta
        shell: bash
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            VERSION="${{ inputs.version }}"
          elif [ -n "${{ github.event.release.tag_name }}" ]; then
            VERSION="${{ github.event.release.tag_name }}"
          elif [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF#refs/tags/}"
          else
            echo "Unable to determine release version"
            exit 1
          fi

          VERSION="${VERSION#v}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=v${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Trace release metadata
        run: |
          echo "meta.version=${{ steps.meta.outputs.version }}"
          echo "meta.tag=${{ steps.meta.outputs.tag }}"

  verify:
    needs: meta
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26"

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ">=1.3.10"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Build UI
        env:
          APP_VERSION: ${{ needs.meta.outputs.version }}
        run: cd ui && bun install --frozen-lockfile && bun run build

      - name: Trace built UI version
        env:
          EXPECTED_VERSION: ${{ needs.meta.outputs.version }}
          APP_VERSION: ${{ needs.meta.outputs.version }}
        run: |
          echo "expected_version=$EXPECTED_VERSION"
          echo "app_version_env=$APP_VERSION"
          echo "ui_package_version=$(node -p \"require('./ui/package.json').version\")"

          echo "dist files:"
          ls -la ui/dist
          ls -la ui/dist/assets || true

          echo "version-like strings in dist:"
          grep -RhoE '[0-9]+\.[0-9]+\.[0-9]+' ui/dist | sort -u || true

          echo "search expected version in dist:"
          if grep -R "$EXPECTED_VERSION" ui/dist >/dev/null 2>&1; then
            echo "OK: found expected version $EXPECTED_VERSION in built UI"
          else
            echo "ERROR: expected version $EXPECTED_VERSION not found in built UI"
            exit 1
          fi

      - name: Download ONNX Runtime for tests
        env:
          ORT_VERSION: "1.25.0"
        run: |
          BASE_URL="https://github.com/microsoft/onnxruntime/releases/download/v${ORT_VERSION}"
          ARCHIVE="onnxruntime-linux-x64-${ORT_VERSION}.tgz"
          curl -L --retry 5 --retry-delay 5 -o "/tmp/${ARCHIVE}" "${BASE_URL}/${ARCHIVE}"
          tar -xzf "/tmp/${ARCHIVE}" -C /tmp
          mkdir -p ./bin
          cp "/tmp/onnxruntime-linux-x64-${ORT_VERSION}/lib/libonnxruntime.so.${ORT_VERSION}" ./bin/libonnxruntime.so
          echo "KNOWNS_ORT_LIB=$(pwd)/bin/libonnxruntime.so" >> "$GITHUB_ENV"
          echo "✓ ONNX Runtime ${ORT_VERSION} installed for tests"

      - name: Run Go tests
        run: go test -v -race ./...

      - name: Run Go vet
        run: go vet ./...

      - name: Upload UI artifact
        uses: actions/upload-artifact@v4
        with:
          name: ui-dist
          path: ui/dist/
          retention-days: 1

  build-binaries:
    needs: [meta, verify]
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-15
            goos: darwin
            goarch: arm64
            npm_pkg: knowns-darwin-arm64
            ext: ""
            cgo_enabled: "1"
            ort_lib: libonnxruntime.dylib
          - runner: ubuntu-latest
            goos: linux
            goarch: amd64
            npm_pkg: knowns-linux-x64
            ext: ""
            cgo_enabled: "1"
            ort_lib: libonnxruntime.so
          - runner: ubuntu-24.04-arm
            goos: linux
            goarch: arm64
            npm_pkg: knowns-linux-arm64
            ext: ""
            cgo_enabled: "1"
            ort_lib: libonnxruntime.so
          - runner: windows-latest
            goos: windows
            goarch: amd64
            npm_pkg: knowns-win-x64
            ext: ".exe"
            cgo_enabled: "1"
            ort_lib: onnxruntime.dll
            llvm_mingw_archive: llvm-mingw-20260407-ucrt-x86_64.zip
            llvm_mingw_prefix: x86_64-w64-mingw32
    runs-on: ${{ matrix.runner }}
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26"

      - name: Install llvm-mingw toolchain
        if: matrix.goos == 'windows'
        run: |
          curl -L --retry 5 --retry-delay 5 \
            -o llvm-mingw.zip \
            "https://github.com/mstorsjo/llvm-mingw/releases/download/20260407/${{ matrix.llvm_mingw_archive }}"
          unzip -q llvm-mingw.zip -d "$RUNNER_TEMP/llvm-mingw"
          TOOLCHAIN_DIR=$(find "$RUNNER_TEMP/llvm-mingw" -mindepth 1 -maxdepth 1 -type d | head -n 1)
          if [ -z "$TOOLCHAIN_DIR" ]; then
            echo "Failed to extract llvm-mingw toolchain"
            exit 1
          fi
          {
            echo "$TOOLCHAIN_DIR/bin"
          } >> "$GITHUB_PATH"
          {
            echo "CC=${{ matrix.llvm_mingw_prefix }}-clang"
            echo "CXX=${{ matrix.llvm_mingw_prefix }}-clang++"
            echo "AR=${{ matrix.llvm_mingw_prefix }}-ar"
          } >> "$GITHUB_ENV"

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ">=1.3.10"

      - name: Download UI artifact
        uses: actions/download-artifact@v4
        with:
          name: ui-dist
          path: ui/dist/

      - name: Run npm installer tests
        if: matrix.goos == 'windows'
        run: bun test npm/knowns/install.test.js

      - name: Trace downloaded UI artifact
        env:
          EXPECTED_VERSION: ${{ needs.meta.outputs.version }}
        run: |
          echo "checking downloaded ui artifact"
          ls -la ui/dist
          ls -la ui/dist/assets || true
          grep -RhoE '[0-9]+\.[0-9]+\.[0-9]+' ui/dist | sort -u || true
          if grep -R "$EXPECTED_VERSION" ui/dist >/dev/null 2>&1; then
            echo "OK: found expected version $EXPECTED_VERSION in downloaded UI artifact"
          else
            echo "ERROR: expected version $EXPECTED_VERSION not found in downloaded UI artifact"
            exit 1
          fi

      - name: Build release binary
        env:
          VERSION: ${{ needs.meta.outputs.version }}
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: ${{ matrix.cgo_enabled }}
        run: |
          LDFLAGS="-s -w -X github.com/howznguyen/knowns/internal/util.Version=${VERSION}"
          mkdir -p "artifacts/${{ matrix.npm_pkg }}"
          go build -ldflags "$LDFLAGS" -o "artifacts/${{ matrix.npm_pkg }}/knowns${{ matrix.ext }}" ./cmd/knowns

      - name: Bundle ONNX Runtime native library
        env:
          ORT_VERSION: "1.25.0"
        run: |
          ARTIFACT_DIR="artifacts/${{ matrix.npm_pkg }}"
          BASE_URL="https://github.com/microsoft/onnxruntime/releases/download/v${ORT_VERSION}"

          echo "=== Bundling ONNX Runtime ${ORT_VERSION} for ${{ matrix.goos }}/${{ matrix.goarch }} ==="

          if [ "${{ matrix.goos }}" = "linux" ] && [ "${{ matrix.goarch }}" = "amd64" ]; then
            ARCHIVE="onnxruntime-linux-x64-${ORT_VERSION}.tgz"
            curl -L --retry 5 --retry-delay 5 -o "$ARCHIVE" "${BASE_URL}/${ARCHIVE}"
            tar -xzf "$ARCHIVE"
            cp "onnxruntime-linux-x64-${ORT_VERSION}/lib/libonnxruntime.so.${ORT_VERSION}" "${ARTIFACT_DIR}/libonnxruntime.so"
            echo "Downloaded libonnxruntime.so (${ORT_VERSION}) for linux/amd64"

          elif [ "${{ matrix.goos }}" = "linux" ] && [ "${{ matrix.goarch }}" = "arm64" ]; then
            ARCHIVE="onnxruntime-linux-aarch64-${ORT_VERSION}.tgz"
            curl -L --retry 5 --retry-delay 5 -o "$ARCHIVE" "${BASE_URL}/${ARCHIVE}"
            tar -xzf "$ARCHIVE"
            cp "onnxruntime-linux-aarch64-${ORT_VERSION}/lib/libonnxruntime.so.${ORT_VERSION}" "${ARTIFACT_DIR}/libonnxruntime.so"
            echo "Downloaded libonnxruntime.so (${ORT_VERSION}) for linux/arm64"

          elif [ "${{ matrix.goos }}" = "darwin" ] && [ "${{ matrix.goarch }}" = "arm64" ]; then
            ARCHIVE="onnxruntime-osx-arm64-${ORT_VERSION}.tgz"
            curl -L --retry 5 --retry-delay 5 -o "$ARCHIVE" "${BASE_URL}/${ARCHIVE}"
            tar -xzf "$ARCHIVE"
            cp "onnxruntime-osx-arm64-${ORT_VERSION}/lib/libonnxruntime.${ORT_VERSION}.dylib" "${ARTIFACT_DIR}/libonnxruntime.dylib"
            echo "Downloaded libonnxruntime.dylib (${ORT_VERSION}) for darwin/arm64"

          elif [ "${{ matrix.goos }}" = "windows" ] && [ "${{ matrix.goarch }}" = "amd64" ]; then
            ARCHIVE="onnxruntime-win-x64-${ORT_VERSION}.zip"
            curl -L --retry 5 --retry-delay 5 -o "$ARCHIVE" "${BASE_URL}/${ARCHIVE}"
            unzip -q "$ARCHIVE"
            cp "onnxruntime-win-x64-${ORT_VERSION}/lib/onnxruntime.dll" "${ARTIFACT_DIR}/onnxruntime.dll"
            echo "Downloaded onnxruntime.dll (${ORT_VERSION}) for windows/amd64"

          else
            echo "FATAL: No download strategy for ${{ matrix.goos }}/${{ matrix.goarch }}"
            exit 1
          fi

          # Verify the native lib was bundled
          if ! ls "${ARTIFACT_DIR}"/*onnxruntime* >/dev/null 2>&1; then
            echo "FATAL: No ONNX Runtime library found for ${{ matrix.goos }}/${{ matrix.goarch }}"
            exit 1
          fi

          echo "=== Artifact contents ==="
          ls -la "${ARTIFACT_DIR}/"

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.npm_pkg }}
          path: artifacts/${{ matrix.npm_pkg }}/
          retention-days: 1

  publish:
    needs: [meta, build-binaries]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Download binary artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Test Linux binary
        env:
          VERSION: ${{ needs.meta.outputs.version }}
        run: |
          chmod +x artifacts/knowns-linux-x64/knowns
          artifacts/knowns-linux-x64/knowns --version
          artifacts/knowns-linux-x64/knowns --version | grep -q "$VERSION" || echo "Warning: Version mismatch"

      - name: Prepare npm packages
        env:
          VERSION: ${{ needs.meta.outputs.version }}
        run: |
          cp README.md npm/knowns/README.md

          PLATFORM_PKGS="knowns-darwin-arm64 knowns-linux-arm64 knowns-linux-x64 knowns-win-x64"

          for pkg in $PLATFORM_PKGS; do
            (
              cd "npm/$pkg"
              npm version "$VERSION" --no-git-tag-version --allow-same-version
            )
          done

          (
            cd npm/knowns
            npm version "$VERSION" --no-git-tag-version --allow-same-version
          )

          for dir in artifacts/knowns-*/; do
            pkg=$(basename "$dir")
            case " $PLATFORM_PKGS " in
              *" $pkg "*) ;;
              *) continue ;;
            esac
            mkdir -p "npm/$pkg"
            cp -R "$dir"/. "npm/$pkg/"
            # Mark executables
            for exe in "npm/$pkg/knowns" "npm/$pkg/knowns.exe"; do
              [ -f "$exe" ] && chmod +x "$exe" 2>/dev/null || true
            done
            if [ ! -f "npm/$pkg/knowns" ] && [ ! -f "npm/$pkg/knowns.exe" ]; then
              echo "Missing main binary for $pkg"
              exit 1
            fi
          done

          node <<'EOF'
          const fs = require('fs');
          const path = require('path');
          const version = process.env.VERSION;
          const repo = { type: 'git', url: 'git+https://github.com/knowns-dev/knowns.git' };
          for (const dir of fs.readdirSync('npm')) {
            const pkgPath = path.join('npm', dir, 'package.json');
            if (!fs.existsSync(pkgPath)) continue;
            const pkg = JSON.parse(fs.readFileSync(pkgPath, 'utf8'));
            pkg.repository = repo;
            pkg.homepage = 'https://knowns.sh';
            if (pkg.name === 'knowns') {
              pkg.bin = { knowns: 'bin/knowns.js', kn: 'bin/knowns.js' };
              pkg.optionalDependencies = {
                '@knowns/darwin-arm64': version,
                '@knowns/linux-arm64': version,
                '@knowns/linux-x64': version,
                '@knowns/win-x64': version,
              };
            }
            fs.writeFileSync(pkgPath, JSON.stringify(pkg, null, 2) + '\n');
          }
          EOF

      - name: Verify npm package contents
        run: |
          echo "=== Verifying ONNX Runtime native libs in all platform packages ==="

          # Windows: onnxruntime.dll
          if [ ! -f "npm/knowns-win-x64/onnxruntime.dll" ]; then
            echo "FATAL: npm/knowns-win-x64/onnxruntime.dll is missing!"
            ls -la npm/knowns-win-x64/ || true
            exit 1
          fi
          echo "✓ knowns-win-x64/onnxruntime.dll"

          # macOS: libonnxruntime.dylib
          for pkg in knowns-darwin-arm64; do
            if ! ls npm/$pkg/libonnxruntime*.dylib >/dev/null 2>&1; then
              echo "FATAL: npm/$pkg/ missing libonnxruntime dylib!"
              ls -la "npm/$pkg/" || true
              exit 1
            fi
            echo "✓ $pkg/libonnxruntime.dylib"
          done

          # Linux: libonnxruntime.so
          for pkg in knowns-linux-arm64 knowns-linux-x64; do
            if ! ls npm/$pkg/libonnxruntime*.so* >/dev/null 2>&1; then
              echo "FATAL: npm/$pkg/ missing libonnxruntime.so!"
              ls -la "npm/$pkg/" || true
              exit 1
            fi
            echo "✓ $pkg/libonnxruntime.so"
          done

          # Main binary in all packages
          for pkg in knowns-darwin-arm64 knowns-linux-arm64 knowns-linux-x64; do
            if [ ! -f "npm/$pkg/knowns" ]; then
              echo "FATAL: npm/$pkg/knowns is missing!"
              exit 1
            fi
            echo "✓ $pkg/knowns"
          done
          if [ ! -f "npm/knowns-win-x64/knowns.exe" ]; then
            echo "FATAL: npm/knowns-win-x64/knowns.exe is missing!"
            exit 1
          fi
          echo "✓ knowns-win-x64/knowns.exe"

      - name: Publish platform packages
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          PLATFORM_PKGS="knowns-darwin-arm64 knowns-linux-arm64 knowns-linux-x64 knowns-win-x64"
          for pkg in $PLATFORM_PKGS; do
            (
              cd "npm/$pkg"
              PKG_NAME=$(node -p "require('./package.json').name")
              PKG_VERSION=$(node -p "require('./package.json').version")

              if npm view "${PKG_NAME}@${PKG_VERSION}" version >/dev/null 2>&1; then
                echo "Skipping ${PKG_NAME}@${PKG_VERSION} (already published)"
                exit 0
              fi

              for attempt in 1 2 3 4 5; do
                if npm publish --access public; then
                  exit 0
                fi

                echo "Publish failed for ${PKG_NAME}@${PKG_VERSION}, retry ${attempt}/5..."
                sleep 20

                if npm view "${PKG_NAME}@${PKG_VERSION}" version >/dev/null 2>&1; then
                  echo "${PKG_NAME}@${PKG_VERSION} is now visible, continuing"
                  exit 0
                fi
              done

              echo "Failed to publish ${PKG_NAME}@${PKG_VERSION} after retries"
              exit 1
            )
            sleep 10
          done

      - name: Publish main package
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          cd npm/knowns
          PKG_NAME=$(node -p "require('./package.json').name")
          PKG_VERSION=$(node -p "require('./package.json').version")

          if npm view "${PKG_NAME}@${PKG_VERSION}" version >/dev/null 2>&1; then
            echo "Skipping ${PKG_NAME}@${PKG_VERSION} (already published)"
            exit 0
          fi

          for attempt in 1 2 3 4 5; do
            if npm publish --provenance --access public; then
              exit 0
            fi

            echo "Publish failed for ${PKG_NAME}@${PKG_VERSION}, retry ${attempt}/5..."
            sleep 20

            if npm view "${PKG_NAME}@${PKG_VERSION}" version >/dev/null 2>&1; then
              echo "${PKG_NAME}@${PKG_VERSION} is now visible, continuing"
              exit 0
            fi
          done

          echo "Failed to publish ${PKG_NAME}@${PKG_VERSION} after retries"
          exit 1

      - name: Create tarballs
        run: |
          for pkgdir in \
            npm/knowns-darwin-arm64 \
            npm/knowns-linux-arm64 \
            npm/knowns-linux-x64 \
            npm/knowns-win-x64; do
            pkg=$(basename "$pkgdir")
            staging=$(mktemp -d)
            find "$pkgdir" -maxdepth 1 -mindepth 1 \
              ! -name 'package.json' \
              ! -name 'README.md' \
              -exec cp -R {} "$staging/" \;
            tar -czvf "${pkg}.tar.gz" -C "$staging" .
            shasum -a 256 "${pkg}.tar.gz" > "${pkg}.tar.gz.sha256"
            rm -rf "$staging"
          done

      - name: Verify tarball contents
        run: |
          for archive in \
            knowns-darwin-arm64.tar.gz; do
            tar -tzf "$archive" | grep -Fx "./knowns" >/dev/null || { echo "$archive missing knowns"; exit 1; }
            tar -tzf "$archive" | grep -E "^\./libonnxruntime.*\.dylib$" >/dev/null || { echo "$archive missing libonnxruntime dylib"; exit 1; }
          done

          for archive in \
            knowns-linux-arm64.tar.gz \
            knowns-linux-x64.tar.gz; do
            tar -tzf "$archive" | grep -Fx "./knowns" >/dev/null || { echo "$archive missing knowns"; exit 1; }
            tar -tzf "$archive" | grep -E "^\./libonnxruntime\.so" >/dev/null || { echo "$archive missing libonnxruntime.so"; exit 1; }
          done

          for archive in knowns-win-x64.tar.gz; do
            tar -tzf "$archive" | grep -Fx "./knowns.exe" >/dev/null || { echo "$archive missing knowns.exe"; exit 1; }
            tar -tzf "$archive" | grep -Fx "./onnxruntime.dll" >/dev/null || { echo "$archive missing onnxruntime.dll"; exit 1; }
          done

          # Verify ELF architecture matches package platform.
          # e_machine at ELF offset 18: 0x3E = x86_64, 0xB7 = aarch64.
          verify_elf_arch() {
            local archive="$1" file="$2" expected_hex="$3" label="$4"
            tmpdir=$(mktemp -d)
            tar -xzf "$archive" -C "$tmpdir"
            machine=$(od -An -tx1 -j18 -N2 "$tmpdir/$file" | tr -d ' ')
            rm -rf "$tmpdir"
            if [ "$machine" != "$expected_hex" ]; then
              echo "FATAL: $archive contains $file with wrong ELF arch (got $machine, expected $expected_hex for $label)"
              exit 1
            fi
            echo "✓ $archive $file arch=$label"
          }

          verify_elf_arch knowns-linux-x64.tar.gz  ./libonnxruntime.so "3e00" "x86_64"
          verify_elf_arch knowns-linux-arm64.tar.gz ./libonnxruntime.so "b700" "aarch64"
          verify_elf_arch knowns-linux-x64.tar.gz   ./knowns            "3e00" "x86_64"
          verify_elf_arch knowns-linux-arm64.tar.gz  ./knowns            "b700" "aarch64"

      - name: Ensure GitHub release exists
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.meta.outputs.tag }}
        run: |
          gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1 || \
            gh release create "$TAG" --repo "$GITHUB_REPOSITORY" --generate-notes

      - name: Upload binaries to release
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.meta.outputs.tag }}
        run: |
          for file in *.tar.gz *.sha256 install/install.sh install/install.ps1 install/uninstall.sh install/uninstall.ps1; do
            gh release upload "$TAG" "$file" --repo "$GITHUB_REPOSITORY" --clobber
          done

      - name: Update Homebrew tap
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          VERSION: ${{ needs.meta.outputs.version }}
        run: |
          if [ -z "$GH_TOKEN" ]; then
            echo "HOMEBREW_TAP_TOKEN not set, skipping Homebrew update"
            exit 0
          fi

          SHA_DARWIN_ARM64=$(awk '{print $1}' knowns-darwin-arm64.tar.gz.sha256)
          SHA_LINUX_X64=$(awk '{print $1}' knowns-linux-x64.tar.gz.sha256)

          git clone https://x-access-token:${GH_TOKEN}@github.com/knowns-dev/homebrew-tap.git
          cd homebrew-tap

          cat > Formula/knowns.rb <<EOF
          class Knowns < Formula
            desc "The memory layer for AI-native software development"
            homepage "https://knowns.sh"
            version "${VERSION}"
            license "MIT"

            on_macos do
              on_arm do
                url "https://github.com/knowns-dev/knowns/releases/download/v${VERSION}/knowns-darwin-arm64.tar.gz"
                sha256 "${SHA_DARWIN_ARM64}"
              end
            end

            on_linux do
              on_intel do
                url "https://github.com/knowns-dev/knowns/releases/download/v${VERSION}/knowns-linux-x64.tar.gz"
                sha256 "${SHA_LINUX_X64}"
              end
            end

            def install
              # ONNX Runtime native lib goes into libexec so knowns can find it
              libexec.install Dir["libonnxruntime*"]
              bin.install "knowns"
              bin.install_symlink "knowns" => "kn"
            end

            test do
              assert_match version.to_s, shell_output("\#{bin}/knowns --version")
            end
          end
          EOF

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/knowns.rb
          git commit -m "Update knowns to v${VERSION}" || echo "No changes to commit"
          git push

      - name: Get changelog from release
        if: github.event_name == 'release'
        id: changelog
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.meta.outputs.tag }}
        run: |
          CHANGELOG=$(gh release view "$TAG" --repo "$GITHUB_REPOSITORY" --json body -q '.body' 2>/dev/null || echo "")
          CHANGELOG=$(echo "$CHANGELOG" | sed '/^\*\*Full Changelog\*\*:/d')
          if [ -z "$CHANGELOG" ]; then
            CHANGELOG="See full release notes on GitHub."
          fi
          if [ ${#CHANGELOG} -gt 1500 ]; then
            CHANGELOG="${CHANGELOG:0:1500}..."
          fi
          CHANGELOG=$(echo "$CHANGELOG" | jq -Rs .)
          echo "content=$CHANGELOG" >> "$GITHUB_OUTPUT"

      - name: Send Discord notification
        if: github.event_name == 'release' && success()
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK_URL }}
          VERSION: ${{ needs.meta.outputs.version }}
          TAG: ${{ needs.meta.outputs.tag }}
          CHANGELOG: ${{ steps.changelog.outputs.content }}
        run: |
          if [ -z "$DISCORD_WEBHOOK" ]; then
            echo "Discord webhook not configured, skipping notification"
            exit 0
          fi

          curl -H "Content-Type: application/json" \
            -X POST \
            -d "{
              \"embeds\": [{
                \"title\": \"Knowns CLI v${VERSION} Released!\",
                \"description\": ${CHANGELOG},
                \"color\": 5814783,
                \"fields\": [
                  {
                    \"name\": \"Install/Update\",
