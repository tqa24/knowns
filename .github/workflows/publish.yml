name: Publish to npm

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: "Version to publish (e.g., 1.0.0)"
        required: false
        type: string

jobs:
  meta:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.meta.outputs.version }}
      tag: ${{ steps.meta.outputs.tag }}
    steps:
      - name: Determine version
        id: meta
        shell: bash
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            VERSION="${{ inputs.version }}"
          elif [ -n "${{ github.event.release.tag_name }}" ]; then
            VERSION="${{ github.event.release.tag_name }}"
          elif [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF#refs/tags/}"
          else
            echo "Unable to determine release version"
            exit 1
          fi

          VERSION="${VERSION#v}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=v${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Trace release metadata
        run: |
          echo "meta.version=${{ steps.meta.outputs.version }}"
          echo "meta.tag=${{ steps.meta.outputs.tag }}"

  verify:
    needs: meta
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26"

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ">=1.3.10"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Build UI
        env:
          APP_VERSION: ${{ needs.meta.outputs.version }}
        run: cd ui && bun install --frozen-lockfile && bun run build

      - name: Trace built UI version
        env:
          EXPECTED_VERSION: ${{ needs.meta.outputs.version }}
          APP_VERSION: ${{ needs.meta.outputs.version }}
        run: |
          UI_PACKAGE_VERSION=$(node -p 'require("./ui/package.json").version')

          echo "expected_version=$EXPECTED_VERSION"
          echo "app_version_env=$APP_VERSION"
          echo "ui_package_version=$UI_PACKAGE_VERSION"

          echo "dist files:"
          ls -la ui/dist
          ls -la ui/dist/assets || true

          echo "version-like strings in dist:"
          grep -RhoE '[0-9]+\.[0-9]+\.[0-9]+' ui/dist | sort -u || true

          echo "search expected version in dist:"
          if grep -R "$EXPECTED_VERSION" ui/dist >/dev/null 2>&1; then
            echo "OK: found expected version $EXPECTED_VERSION in built UI"
          else
            echo "ERROR: expected version $EXPECTED_VERSION not found in built UI"
            exit 1
          fi

      - name: Run Go tests
        run: go test -v -race ./...

      - name: Run Go vet
        run: go vet ./...

      - name: Upload UI artifact
        uses: actions/upload-artifact@v4
        with:
          name: ui-dist
          path: ui/dist/
          retention-days: 1

  build-binaries:
    needs: [meta, verify]
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-15-intel
            goos: darwin
            goarch: amd64
            npm_pkg: knowns-darwin-x64
            ext: ""
            cgo_enabled: "1"
          - runner: macos-15
            goos: darwin
            goarch: arm64
            npm_pkg: knowns-darwin-arm64
            ext: ""
            cgo_enabled: "1"
          - runner: ubuntu-latest
            goos: linux
            goarch: amd64
            npm_pkg: knowns-linux-x64
            ext: ""
            cgo_enabled: "1"
          - runner: ubuntu-24.04-arm
            goos: linux
            goarch: arm64
            npm_pkg: knowns-linux-arm64
            ext: ""
            cgo_enabled: "1"
          - runner: windows-latest
            goos: windows
            goarch: amd64
            npm_pkg: knowns-win-x64
            ext: ".exe"
            cgo_enabled: "1"
            llvm_mingw_archive: llvm-mingw-20260407-ucrt-x86_64.zip
            llvm_mingw_prefix: x86_64-w64-mingw32
          - runner: windows-11-arm
            goos: windows
            goarch: arm64
            npm_pkg: knowns-win-arm64
            ext: ".exe"
            cgo_enabled: "1"
            llvm_mingw_archive: llvm-mingw-20260407-ucrt-aarch64.zip
            llvm_mingw_prefix: aarch64-w64-mingw32
    runs-on: ${{ matrix.runner }}
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26"

      - name: Install llvm-mingw toolchain
        if: matrix.goos == 'windows'
        run: |
          curl -L --retry 5 --retry-delay 5 \
            -o llvm-mingw.zip \
            "https://github.com/mstorsjo/llvm-mingw/releases/download/20260407/${{ matrix.llvm_mingw_archive }}"
          unzip -q llvm-mingw.zip -d "$RUNNER_TEMP/llvm-mingw"
          TOOLCHAIN_DIR=$(find "$RUNNER_TEMP/llvm-mingw" -mindepth 1 -maxdepth 1 -type d | head -n 1)
          if [ -z "$TOOLCHAIN_DIR" ]; then
            echo "Failed to extract llvm-mingw toolchain"
            exit 1
          fi
          {
            echo "$TOOLCHAIN_DIR/bin"
          } >> "$GITHUB_PATH"
          {
            echo "CC=${{ matrix.llvm_mingw_prefix }}-clang"
            echo "CXX=${{ matrix.llvm_mingw_prefix }}-clang++"
            echo "AR=${{ matrix.llvm_mingw_prefix }}-ar"
          } >> "$GITHUB_ENV"

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ">=1.3.10"

      - name: Download UI artifact
        uses: actions/download-artifact@v4
        with:
          name: ui-dist
          path: ui/dist/

      - name: Run npm installer tests
        if: matrix.goos == 'windows'
        run: bun test npm/knowns/install.test.js

      - name: Trace downloaded UI artifact
        env:
          EXPECTED_VERSION: ${{ needs.meta.outputs.version }}
        run: |
          echo "checking downloaded ui artifact"
          ls -la ui/dist
          ls -la ui/dist/assets || true
          grep -RhoE '[0-9]+\.[0-9]+\.[0-9]+' ui/dist | sort -u || true
          if grep -R "$EXPECTED_VERSION" ui/dist >/dev/null 2>&1; then
            echo "OK: found expected version $EXPECTED_VERSION in downloaded UI artifact"
          else
            echo "ERROR: expected version $EXPECTED_VERSION not found in downloaded UI artifact"
            exit 1
          fi

      - name: Build release binary
        env:
          VERSION: ${{ needs.meta.outputs.version }}
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: ${{ matrix.cgo_enabled }}
        run: |
          LDFLAGS="-s -w -X github.com/howznguyen/knowns/internal/util.Version=${VERSION}"
          mkdir -p "artifacts/${{ matrix.npm_pkg }}"

          go build -ldflags "$LDFLAGS" -o "artifacts/${{ matrix.npm_pkg }}/knowns${{ matrix.ext }}" ./cmd/knowns

      - name: Derive sidecar bun target
        id: sidecar
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          NPM_PKG: ${{ matrix.npm_pkg }}
        run: |
          case "${GOOS}-${GOARCH}" in
            darwin-amd64) BUN_TARGET=bun-darwin-x64; BUNDLE=knowns-embed-darwin-x64 ;;
            darwin-arm64) BUN_TARGET=bun-darwin-arm64; BUNDLE=knowns-embed-darwin-arm64 ;;
            linux-amd64)  BUN_TARGET=bun-linux-x64; BUNDLE=knowns-embed-linux-x64 ;;
            linux-arm64)  BUN_TARGET=bun-linux-arm64; BUNDLE=knowns-embed-linux-arm64 ;;
            windows-amd64) BUN_TARGET=bun-windows-x64; BUNDLE=knowns-embed-win-x64 ;;
            windows-arm64) BUN_TARGET=skip; BUNDLE=skip ;;
            *) echo "Unknown ${GOOS}-${GOARCH}"; exit 1 ;;
          esac
          echo "bun_target=${BUN_TARGET}" >> "$GITHUB_OUTPUT"
          echo "bundle=${BUNDLE}" >> "$GITHUB_OUTPUT"

      - name: Build sidecar bundle
        if: steps.sidecar.outputs.bun_target != 'skip'
        env:
          BUN_TARGET: ${{ steps.sidecar.outputs.bun_target }}
        run: |
          cd sidecar
          bun install --frozen-lockfile
          bun run build.ts "$BUN_TARGET"

      - name: Bundle sidecar into artifact
        if: steps.sidecar.outputs.bun_target != 'skip'
        env:
          BUNDLE: ${{ steps.sidecar.outputs.bundle }}
          NPM_PKG: ${{ matrix.npm_pkg }}
        run: |
          BUNDLE_DIR="sidecar/dist/${BUNDLE}"
          if [ ! -d "$BUNDLE_DIR" ]; then
            echo "Sidecar bundle not found: $BUNDLE_DIR"
            ls -la sidecar/dist/ || true
            exit 1
          fi
          echo "Bundle contents:"
          ls -la "$BUNDLE_DIR"
          # Copy every file from bundle dir into the artifact dir
          cp -R "$BUNDLE_DIR"/. "artifacts/${NPM_PKG}/"
          chmod +x "artifacts/${NPM_PKG}/knowns-embed"* 2>/dev/null || true

      - name: Smoke test Windows sidecar
        if: matrix.goos == 'windows' && matrix.goarch == 'amd64'
        shell: pwsh
        run: |
          $sidecar = "artifacts/${{ matrix.npm_pkg }}/knowns-embed.exe"
          if (-not (Test-Path $sidecar)) {
            throw "Missing sidecar binary: $sidecar"
          }

          $response = '{"jsonrpc":"2.0","id":1,"method":"ping","params":{}}' | & $sidecar 2>&1
          if ($LASTEXITCODE -ne 0) {
            throw "knowns-embed.exe exited with code $LASTEXITCODE`n$response"
          }

          $jsonLine = $response | Where-Object { $_ -match '^\{.*\}$' } | Select-Object -Last 1
          if (-not $jsonLine) {
            throw "knowns-embed.exe did not return a JSON-RPC response`n$response"
          }

          $parsed = $jsonLine | ConvertFrom-Json
          if (-not $parsed.result.ok) {
            throw "Unexpected sidecar ping response: $jsonLine"
          }

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.npm_pkg }}
          path: artifacts/${{ matrix.npm_pkg }}/
          retention-days: 1

  publish:
    needs: [meta, build-binaries]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Download binary artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Test Linux binary
        env:
          VERSION: ${{ needs.meta.outputs.version }}
        run: |
          chmod +x artifacts/knowns-linux-x64/knowns
          artifacts/knowns-linux-x64/knowns --version
          artifacts/knowns-linux-x64/knowns --version | grep -q "$VERSION" || echo "Warning: Version mismatch"

      - name: Prepare npm packages
        env:
          VERSION: ${{ needs.meta.outputs.version }}
        run: |
          cp README.md npm/knowns/README.md

          for pkg in npm/knowns-*/; do
            (
              cd "$pkg"
              npm version "$VERSION" --no-git-tag-version --allow-same-version
            )
          done

          (
            cd npm/knowns
            npm version "$VERSION" --no-git-tag-version --allow-same-version
          )

          for dir in artifacts/knowns-*/; do
            pkg=$(basename "$dir")
            mkdir -p "npm/$pkg"
            # Copy every file (main binary + sidecar bundle contents) to npm package dir
            cp -R "$dir"/. "npm/$pkg/"
            # Mark executables
            for exe in "npm/$pkg/knowns" "npm/$pkg/knowns.exe" "npm/$pkg/knowns-embed" "npm/$pkg/knowns-embed.exe"; do
              [ -f "$exe" ] && chmod +x "$exe" 2>/dev/null || true
            done
            if [ ! -f "npm/$pkg/knowns" ] && [ ! -f "npm/$pkg/knowns.exe" ]; then
              echo "Missing main binary for $pkg"
              exit 1
            fi
          done

          node <<'EOF'
          const fs = require('fs');
          const path = require('path');
          const version = process.env.VERSION;
          const repo = { type: 'git', url: 'git+https://github.com/knowns-dev/knowns.git' };
          for (const dir of fs.readdirSync('npm')) {
            const pkgPath = path.join('npm', dir, 'package.json');
            if (!fs.existsSync(pkgPath)) continue;
            const pkg = JSON.parse(fs.readFileSync(pkgPath, 'utf8'));
            pkg.repository = repo;
            pkg.homepage = 'https://knowns.sh';
            if (pkg.name === 'knowns') {
              pkg.bin = { knowns: 'bin/knowns.js', kn: 'bin/knowns.js' };
              pkg.optionalDependencies = {
                '@knowns/darwin-arm64': version,
                '@knowns/darwin-x64': version,
                '@knowns/linux-arm64': version,
                '@knowns/linux-x64': version,
                '@knowns/win-arm64': version,
                '@knowns/win-x64': version,
              };
            }
            fs.writeFileSync(pkgPath, JSON.stringify(pkg, null, 2) + '\n');
          }
          EOF

      - name: Publish platform packages
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          for pkg in npm/knowns-*/; do
            (
              cd "$pkg"
              PKG_NAME=$(node -p "require('./package.json').name")
              PKG_VERSION=$(node -p "require('./package.json').version")

              if npm view "${PKG_NAME}@${PKG_VERSION}" version >/dev/null 2>&1; then
                echo "Skipping ${PKG_NAME}@${PKG_VERSION} (already published)"
                exit 0
              fi

              for attempt in 1 2 3 4 5; do
                if npm publish --access public; then
                  exit 0
                fi

                echo "Publish failed for ${PKG_NAME}@${PKG_VERSION}, retry ${attempt}/5..."
                sleep 20

                if npm view "${PKG_NAME}@${PKG_VERSION}" version >/dev/null 2>&1; then
                  echo "${PKG_NAME}@${PKG_VERSION} is now visible, continuing"
                  exit 0
                fi
              done

              echo "Failed to publish ${PKG_NAME}@${PKG_VERSION} after retries"
              exit 1
            )
            sleep 10
          done

      - name: Publish main package
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          cd npm/knowns
          PKG_NAME=$(node -p "require('./package.json').name")
          PKG_VERSION=$(node -p "require('./package.json').version")

          if npm view "${PKG_NAME}@${PKG_VERSION}" version >/dev/null 2>&1; then
            echo "Skipping ${PKG_NAME}@${PKG_VERSION} (already published)"
            exit 0
          fi

          for attempt in 1 2 3 4 5; do
            if npm publish --provenance --access public; then
              exit 0
            fi

            echo "Publish failed for ${PKG_NAME}@${PKG_VERSION}, retry ${attempt}/5..."
            sleep 20

            if npm view "${PKG_NAME}@${PKG_VERSION}" version >/dev/null 2>&1; then
              echo "${PKG_NAME}@${PKG_VERSION} is now visible, continuing"
              exit 0
            fi
          done

          echo "Failed to publish ${PKG_NAME}@${PKG_VERSION} after retries"
          exit 1

      - name: Create tarballs
        run: |
          for pkgdir in \
            npm/knowns-darwin-arm64 \
            npm/knowns-darwin-x64 \
            npm/knowns-linux-arm64 \
            npm/knowns-linux-x64 \
            npm/knowns-win-arm64 \
            npm/knowns-win-x64; do
            pkg=$(basename "$pkgdir")
            staging=$(mktemp -d)
            # Copy everything except npm metadata
            find "$pkgdir" -maxdepth 1 -mindepth 1 \
              ! -name 'package.json' \
              ! -name 'README.md' \
              -exec cp -R {} "$staging/" \;
            tar -czvf "${pkg}.tar.gz" -C "$staging" .
            shasum -a 256 "${pkg}.tar.gz" > "${pkg}.tar.gz.sha256"
            rm -rf "$staging"
          done

      - name: Verify tarball contents
        run: |
          for archive in \
            knowns-darwin-arm64.tar.gz \
            knowns-darwin-x64.tar.gz; do
            tar -tzf "$archive" | grep -Fx "./knowns" >/dev/null || { echo "$archive missing knowns"; exit 1; }
            tar -tzf "$archive" | grep -Fx "./knowns-embed" >/dev/null || { echo "$archive missing knowns-embed"; exit 1; }
            tar -tzf "$archive" | grep -E "^\./libonnxruntime.*\.dylib$" >/dev/null || { echo "$archive missing libonnxruntime dylib"; exit 1; }
            tar -tzf "$archive" | grep -Fx "./onnxruntime_binding.node" >/dev/null || { echo "$archive missing onnxruntime_binding.node"; exit 1; }
          done

          for archive in \
            knowns-linux-arm64.tar.gz \
            knowns-linux-x64.tar.gz; do
            tar -tzf "$archive" | grep -Fx "./knowns" >/dev/null || { echo "$archive missing knowns"; exit 1; }
            tar -tzf "$archive" | grep -Fx "./knowns-embed" >/dev/null || { echo "$archive missing knowns-embed"; exit 1; }
            tar -tzf "$archive" | grep -E "^\./libonnxruntime\.so" >/dev/null || { echo "$archive missing libonnxruntime.so"; exit 1; }
            tar -tzf "$archive" | grep -Fx "./onnxruntime_binding.node" >/dev/null || { echo "$archive missing onnxruntime_binding.node"; exit 1; }
          done

          for archive in knowns-win-x64.tar.gz; do
            tar -tzf "$archive" | grep -Fx "./knowns.exe" >/dev/null || { echo "$archive missing knowns.exe"; exit 1; }
            tar -tzf "$archive" | grep -Fx "./knowns-embed.exe" >/dev/null || { echo "$archive missing knowns-embed.exe"; exit 1; }
            tar -tzf "$archive" | grep -Fx "./onnxruntime.dll" >/dev/null || { echo "$archive missing onnxruntime.dll"; exit 1; }
            tar -tzf "$archive" | grep -Fx "./onnxruntime_binding.node" >/dev/null || { echo "$archive missing onnxruntime_binding.node"; exit 1; }
          done

          for archive in knowns-win-arm64.tar.gz; do
            tar -tzf "$archive" | grep -Fx "./knowns.exe" >/dev/null || { echo "$archive missing knowns.exe"; exit 1; }
            echo "Note: $archive does not ship knowns-embed (Bun has no windows-arm64 compile target yet)"
          done

      - name: Ensure GitHub release exists
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.meta.outputs.tag }}
        run: |
          gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1 || \
            gh release create "$TAG" --repo "$GITHUB_REPOSITORY" --generate-notes

      - name: Upload binaries to release
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.meta.outputs.tag }}
        run: |
          for file in *.tar.gz *.sha256 install/install.sh install/install.ps1 install/uninstall.sh install/uninstall.ps1; do
            gh release upload "$TAG" "$file" --repo "$GITHUB_REPOSITORY" --clobber
          done

      - name: Update Homebrew tap
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          VERSION: ${{ needs.meta.outputs.version }}
        run: |
          if [ -z "$GH_TOKEN" ]; then
            echo "HOMEBREW_TAP_TOKEN not set, skipping Homebrew update"
            exit 0
          fi

          SHA_DARWIN_ARM64=$(awk '{print $1}' knowns-darwin-arm64.tar.gz.sha256)
          SHA_DARWIN_X64=$(awk '{print $1}' knowns-darwin-x64.tar.gz.sha256)
          SHA_LINUX_X64=$(awk '{print $1}' knowns-linux-x64.tar.gz.sha256)

          git clone https://x-access-token:${GH_TOKEN}@github.com/knowns-dev/homebrew-tap.git
          cd homebrew-tap

          cat > Formula/knowns.rb <<EOF
          class Knowns < Formula
            desc "The memory layer for AI-native software development"
            homepage "https://knowns.sh"
            version "${VERSION}"
            license "MIT"

            on_macos do
              on_arm do
                url "https://github.com/knowns-dev/knowns/releases/download/v${VERSION}/knowns-darwin-arm64.tar.gz"
                sha256 "${SHA_DARWIN_ARM64}"
              end
              on_intel do
                url "https://github.com/knowns-dev/knowns/releases/download/v${VERSION}/knowns-darwin-x64.tar.gz"
                sha256 "${SHA_DARWIN_X64}"
              end
            end

            on_linux do
              on_intel do
                url "https://github.com/knowns-dev/knowns/releases/download/v${VERSION}/knowns-linux-x64.tar.gz"
                sha256 "${SHA_LINUX_X64}"
              end
            end

            def install
              # Sidecar bundle goes into libexec so @loader_path resolves the dylib
              # and the .node addon as siblings of knowns-embed.
              libexec.install "knowns-embed"
              libexec.install Dir["libonnxruntime*"]
              libexec.install "onnxruntime_binding.node" if File.exist?("onnxruntime_binding.node")
              bin.install "knowns"
              bin.install_symlink libexec/"knowns-embed"
              bin.install_symlink "knowns" => "kn"
            end

            test do
              assert_match version.to_s, shell_output("\#{bin}/knowns --version")
            end
          end
          EOF

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/knowns.rb
          git commit -m "Update knowns to v${VERSION}" || echo "No changes to commit"
          git push

      - name: Get changelog from release
        if: github.event_name == 'release'
        id: changelog
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.meta.outputs.tag }}
        run: |
          CHANGELOG=$(gh release view "$TAG" --repo "$GITHUB_REPOSITORY" --json body -q '.body' 2>/dev/null || echo "")
          CHANGELOG=$(echo "$CHANGELOG" | sed '/^\*\*Full Changelog\*\*:/d')
          if [ -z "$CHANGELOG" ]; then
            CHANGELOG="See full release notes on GitHub."
          fi
          if [ ${#CHANGELOG} -gt 1500 ]; then
            CHANGELOG="${CHANGELOG:0:1500}..."
          fi
          CHANGELOG=$(echo "$CHANGELOG" | jq -Rs .)
          echo "content=$CHANGELOG" >> "$GITHUB_OUTPUT"

      - name: Send Discord notification
        if: github.event_name == 'release' && success()
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK_URL }}
          VERSION: ${{ needs.meta.outputs.version }}
          TAG: ${{ needs.meta.outputs.tag }}
          CHANGELOG: ${{ steps.changelog.outputs.content }}
        run: |
          if [ -z "$DISCORD_WEBHOOK" ]; then
            echo "Discord webhook not configured, skipping notification"
            exit 0
          fi

          curl -H "Content-Type: application/json" \
            -X POST \
            -d "{
              \"embeds\": [{
                \"title\": \"Knowns CLI v${VERSION} Released!\",
                \"description\": ${CHANGELOG},
                \"color\": 5814783,
                \"fields\": [
                  {
                    \"name\": \"Install/Update\",
                    \"value\": \"\`\`\`bash\\n# npm\\nnpm install -g knowns@${VERSION}\\n\\n# bun\\nbun add -g knowns@${VERSION}\\n\\n# brew\\nbrew upgrade knowns-dev/tap/knowns\\n\`\`\`\",
                    \"inline\": false
                  },
                  {
                    \"name\": \"Links\",
                    \"value\": \"[npm](https://www.npmjs.com/package/knowns/v/${VERSION}) | [GitHub Release](https://github.com/knowns-dev/knowns/releases/tag/${TAG}) | [Docs](https://knowns.sh/docs)\",
                    \"inline\": false
                  }
                ],
                \"footer\": {
                  \"text\": \"Knowns CLI\"
                },
                \"timestamp\": \"$(date -u +%Y-%m-%dT%H:%M:%SZ)\"
              }]
            }" \
            "$DISCORD_WEBHOOK"
