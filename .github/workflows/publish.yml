name: Publish to npm

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: "Version to publish (e.g., 1.0.0)"
        required: false
        type: string

jobs:
  meta:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.meta.outputs.version }}
      tag: ${{ steps.meta.outputs.tag }}
    steps:
      - name: Determine version
        id: meta
        shell: bash
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            VERSION="${{ inputs.version }}"
          elif [ -n "${{ github.event.release.tag_name }}" ]; then
            VERSION="${{ github.event.release.tag_name }}"
          elif [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF#refs/tags/}"
          else
            echo "Unable to determine release version"
            exit 1
          fi

          VERSION="${VERSION#v}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=v${VERSION}" >> "$GITHUB_OUTPUT"

  verify:
    needs: meta
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build UI
        env:
          APP_VERSION: ${{ needs.meta.outputs.version }}
        run: cd ui && bun install --frozen-lockfile && bun run build

      - name: Run Go tests
        run: go test -v -race ./...

      - name: Run Go vet
        run: go vet ./...

      - name: Upload UI artifact
        uses: actions/upload-artifact@v4
        with:
          name: ui-dist
          path: ui/dist/
          retention-days: 1

  build-binaries:
    needs: [meta, verify]
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-13
            goos: darwin
            goarch: amd64
            npm_pkg: knowns-darwin-x64
            ext: ''
          - runner: macos-14
            goos: darwin
            goarch: arm64
            npm_pkg: knowns-darwin-arm64
            ext: ''
          - runner: ubuntu-latest
            goos: linux
            goarch: amd64
            npm_pkg: knowns-linux-x64
            ext: ''
          - runner: ubuntu-24.04-arm
            goos: linux
            goarch: arm64
            npm_pkg: knowns-linux-arm64
            ext: ''
          - runner: windows-latest
            goos: windows
            goarch: amd64
            npm_pkg: knowns-win-x64
            ext: '.exe'
          - runner: windows-11-arm
            goos: windows
            goarch: arm64
            npm_pkg: knowns-win-arm64
            ext: '.exe'
    runs-on: ${{ matrix.runner }}
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - name: Setup Windows LLVM
        if: runner.os == 'Windows'
        shell: pwsh
        run: choco install llvm -y

      - name: Download UI artifact
        uses: actions/download-artifact@v4
        with:
          name: ui-dist
          path: ui/dist/

      - name: Build semantic-enabled binary
        env:
          VERSION: ${{ needs.meta.outputs.version }}
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: '1'
        run: |
          LDFLAGS="-s -w -X github.com/howznguyen/knowns/internal/util.Version=${VERSION}"
          mkdir -p "artifacts/${{ matrix.npm_pkg }}"

          if [ "$RUNNER_OS" = "Windows" ]; then
            export CC=clang
            export CXX=clang++
          fi

          go build -ldflags "$LDFLAGS" -o "artifacts/${{ matrix.npm_pkg }}/knowns${{ matrix.ext }}" ./cmd/knowns

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.npm_pkg }}
          path: artifacts/${{ matrix.npm_pkg }}/knowns*
          retention-days: 1

  publish:
    needs: [meta, build-binaries]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Download binary artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Test Linux binary
        env:
          VERSION: ${{ needs.meta.outputs.version }}
        run: |
          chmod +x artifacts/knowns-linux-x64/knowns
          artifacts/knowns-linux-x64/knowns --version
          artifacts/knowns-linux-x64/knowns --version | grep -q "$VERSION" || echo "Warning: Version mismatch"

      - name: Prepare npm packages
        env:
          VERSION: ${{ needs.meta.outputs.version }}
        run: |
          cp README.md npm/knowns/README.md

          for pkg in npm/knowns-*/; do
            (
              cd "$pkg"
              npm version "$VERSION" --no-git-tag-version --allow-same-version
            )
          done

          (
            cd npm/knowns
            npm version "$VERSION" --no-git-tag-version --allow-same-version
          )

          for dir in artifacts/knowns-*/; do
            pkg=$(basename "$dir")
            binary=$(ls "$dir"/knowns* 2>/dev/null | head -1)
            if [ -z "$binary" ]; then
              echo "Missing binary for $pkg"
              exit 1
            fi
            cp "$binary" "npm/$pkg/$(basename "$binary")"
          done

          node <<'EOF'
          const fs = require('fs');
          const path = require('path');
          const version = process.env.VERSION;
          const repo = { type: 'git', url: 'git+https://github.com/knowns-dev/knowns.git' };
          for (const dir of fs.readdirSync('npm')) {
            const pkgPath = path.join('npm', dir, 'package.json');
            if (!fs.existsSync(pkgPath)) continue;
            const pkg = JSON.parse(fs.readFileSync(pkgPath, 'utf8'));
            pkg.repository = repo;
            if (pkg.name === 'knowns') {
              pkg.bin = { knowns: 'bin/knowns.js', kn: 'bin/knowns.js' };
              pkg.optionalDependencies = {
                '@knowns/darwin-arm64': version,
                '@knowns/darwin-x64': version,
                '@knowns/linux-arm64': version,
                '@knowns/linux-x64': version,
                '@knowns/win-arm64': version,
                '@knowns/win-x64': version,
              };
            }
            fs.writeFileSync(pkgPath, JSON.stringify(pkg, null, 2) + '\n');
          }
          EOF

      - name: Publish platform packages
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          for pkg in npm/knowns-*/; do
            (
              cd "$pkg"
              PKG_NAME=$(node -p "require('./package.json').name")
              PKG_VERSION=$(node -p "require('./package.json').version")

              if npm view "${PKG_NAME}@${PKG_VERSION}" version >/dev/null 2>&1; then
                echo "Skipping ${PKG_NAME}@${PKG_VERSION} (already published)"
                exit 0
              fi

              for attempt in 1 2 3 4 5; do
                if npm publish --access public; then
                  exit 0
                fi

                echo "Publish failed for ${PKG_NAME}@${PKG_VERSION}, retry ${attempt}/5..."
                sleep 20

                if npm view "${PKG_NAME}@${PKG_VERSION}" version >/dev/null 2>&1; then
                  echo "${PKG_NAME}@${PKG_VERSION} is now visible, continuing"
                  exit 0
                fi
              done

              echo "Failed to publish ${PKG_NAME}@${PKG_VERSION} after retries"
              exit 1
            )
            sleep 10
          done

      - name: Publish main package
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          cd npm/knowns
          PKG_NAME=$(node -p "require('./package.json').name")
          PKG_VERSION=$(node -p "require('./package.json').version")

          if npm view "${PKG_NAME}@${PKG_VERSION}" version >/dev/null 2>&1; then
            echo "Skipping ${PKG_NAME}@${PKG_VERSION} (already published)"
            exit 0
          fi

          for attempt in 1 2 3 4 5; do
            if npm publish --provenance --access public; then
              exit 0
            fi

            echo "Publish failed for ${PKG_NAME}@${PKG_VERSION}, retry ${attempt}/5..."
            sleep 20

            if npm view "${PKG_NAME}@${PKG_VERSION}" version >/dev/null 2>&1; then
              echo "${PKG_NAME}@${PKG_VERSION} is now visible, continuing"
              exit 0
            fi
          done

          echo "Failed to publish ${PKG_NAME}@${PKG_VERSION} after retries"
          exit 1

      - name: Create tarballs
        run: |
          for bin in \
            npm/knowns-darwin-arm64/knowns \
            npm/knowns-darwin-x64/knowns \
            npm/knowns-linux-arm64/knowns \
            npm/knowns-linux-x64/knowns \
            npm/knowns-win-arm64/knowns.exe \
            npm/knowns-win-x64/knowns.exe; do
            base=$(basename "$bin")
            pkg=$(basename "$(dirname "$bin")")
            cp "$bin" "$base"
            tar -czvf "${pkg}.tar.gz" "$base"
            shasum -a 256 "${pkg}.tar.gz" > "${pkg}.tar.gz.sha256"
            rm "$base"
          done

      - name: Ensure GitHub release exists
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.meta.outputs.tag }}
        run: |
          gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1 || \
            gh release create "$TAG" --repo "$GITHUB_REPOSITORY" --generate-notes

      - name: Upload binaries to release
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.meta.outputs.tag }}
        run: |
          for file in *.tar.gz *.sha256; do
            gh release upload "$TAG" "$file" --repo "$GITHUB_REPOSITORY" --clobber
          done

      - name: Update Homebrew tap
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          VERSION: ${{ needs.meta.outputs.version }}
        run: |
          if [ -z "$GH_TOKEN" ]; then
            echo "HOMEBREW_TAP_TOKEN not set, skipping Homebrew update"
            exit 0
          fi

          SHA_DARWIN_ARM64=$(awk '{print $1}' knowns-darwin-arm64.tar.gz.sha256)
          SHA_DARWIN_X64=$(awk '{print $1}' knowns-darwin-x64.tar.gz.sha256)
          SHA_LINUX_X64=$(awk '{print $1}' knowns-linux-x64.tar.gz.sha256)

          git clone https://x-access-token:${GH_TOKEN}@github.com/knowns-dev/homebrew-tap.git
          cd homebrew-tap

          cat > Formula/knowns.rb <<EOF
          class Knowns < Formula
            desc "The memory layer for AI-native software development"
            homepage "https://knowns.sh"
            version "${VERSION}"
            license "MIT"

            on_macos do
              on_arm do
                url "https://github.com/knowns-dev/knowns/releases/download/v${VERSION}/knowns-darwin-arm64.tar.gz"
                sha256 "${SHA_DARWIN_ARM64}"
              end
              on_intel do
                url "https://github.com/knowns-dev/knowns/releases/download/v${VERSION}/knowns-darwin-x64.tar.gz"
                sha256 "${SHA_DARWIN_X64}"
              end
            end

            on_linux do
              on_intel do
                url "https://github.com/knowns-dev/knowns/releases/download/v${VERSION}/knowns-linux-x64.tar.gz"
                sha256 "${SHA_LINUX_X64}"
              end
            end

            def install
              if OS.mac? && Hardware::CPU.arm?
                bin.install "knowns-darwin-arm64" => "knowns"
              elsif OS.mac? && Hardware::CPU.intel?
                bin.install "knowns-darwin-x64" => "knowns"
              elsif OS.linux? && Hardware::CPU.intel?
                bin.install "knowns-linux-x64" => "knowns"
              end
              bin.install_symlink "knowns" => "kn"
            end

            test do
              assert_match version.to_s, shell_output("\#{bin}/knowns --version")
            end
          end
          EOF

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/knowns.rb
          git commit -m "Update knowns to v${VERSION}" || echo "No changes to commit"
          git push

      - name: Get changelog from release
        if: github.event_name == 'release'
        id: changelog
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.meta.outputs.tag }}
        run: |
          CHANGELOG=$(gh release view "$TAG" --repo "$GITHUB_REPOSITORY" --json body -q '.body' 2>/dev/null || echo "")
          CHANGELOG=$(echo "$CHANGELOG" | sed '/^\*\*Full Changelog\*\*:/d')
          if [ -z "$CHANGELOG" ]; then
            CHANGELOG="See full release notes on GitHub."
          fi
          if [ ${#CHANGELOG} -gt 1500 ]; then
            CHANGELOG="${CHANGELOG:0:1500}..."
          fi
          CHANGELOG=$(echo "$CHANGELOG" | jq -Rs .)
          echo "content=$CHANGELOG" >> "$GITHUB_OUTPUT"

      - name: Send Discord notification
        if: github.event_name == 'release' && success()
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK_URL }}
          VERSION: ${{ needs.meta.outputs.version }}
          TAG: ${{ needs.meta.outputs.tag }}
          CHANGELOG: ${{ steps.changelog.outputs.content }}
        run: |
          if [ -z "$DISCORD_WEBHOOK" ]; then
            echo "Discord webhook not configured, skipping notification"
            exit 0
          fi

          curl -H "Content-Type: application/json" \
            -X POST \
            -d "{
              \"embeds\": [{
                \"title\": \"Knowns CLI v${VERSION} Released!\",
                \"description\": ${CHANGELOG},
                \"color\": 5814783,
                \"fields\": [
                  {
                    \"name\": \"Install/Update\",
                    \"value\": \"\`\`\`bash\\n# npm\\nnpm install -g knowns@${VERSION}\\n\\n# bun\\nbun add -g knowns@${VERSION}\\n\\n# brew\\nbrew upgrade knowns\\n\`\`\`\",
                    \"inline\": false
                  },
                  {
                    \"name\": \"Links\",
                    \"value\": \"[npm](https://www.npmjs.com/package/knowns/v/${VERSION}) | [GitHub Release](https://github.com/knowns-dev/knowns/releases/tag/${TAG}) | [Docs](https://knowns.sh/docs)\",
                    \"inline\": false
                  }
                ],
                \"footer\": {
                  \"text\": \"Knowns CLI\"
                },
                \"timestamp\": \"$(date -u +%Y-%m-%dT%H:%M:%SZ)\"
              }]
            }" \
            "$DISCORD_WEBHOOK"
