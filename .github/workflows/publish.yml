name: Publish to npm (Manual)

# Manual-only publish for re-publishing without a new tag.
# For normal releases, use the Build & Release workflow (triggered by git tags).

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to publish (e.g., 1.0.0)"
        required: true
        type: string

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
      - uses: oven-sh/setup-bun@v2
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      # Build UI
      - name: Build UI
        run: cd ui && bun install --frozen-lockfile && bun run build

      # Cross-compile Go binaries with embedded UI
      - name: Build all platform binaries
        run: |
          VERSION=${{ inputs.version }}
          LDFLAGS="-s -w -X github.com/howznguyen/knowns/internal/util.Version=${VERSION}"

          echo "Building for all platforms..."
          CGO_ENABLED=0 GOOS=darwin  GOARCH=arm64 go build -ldflags "$LDFLAGS" -o npm/knowns-darwin-arm64/knowns   ./cmd/knowns
          CGO_ENABLED=0 GOOS=darwin  GOARCH=amd64 go build -ldflags "$LDFLAGS" -o npm/knowns-darwin-x64/knowns    ./cmd/knowns
          CGO_ENABLED=0 GOOS=linux   GOARCH=arm64 go build -ldflags "$LDFLAGS" -o npm/knowns-linux-arm64/knowns   ./cmd/knowns
          CGO_ENABLED=0 GOOS=linux   GOARCH=amd64 go build -ldflags "$LDFLAGS" -o npm/knowns-linux-x64/knowns    ./cmd/knowns
          CGO_ENABLED=0 GOOS=windows GOARCH=arm64 go build -ldflags "$LDFLAGS" -o npm/knowns-win-arm64/knowns.exe ./cmd/knowns
          CGO_ENABLED=0 GOOS=windows GOARCH=amd64 go build -ldflags "$LDFLAGS" -o npm/knowns-win-x64/knowns.exe  ./cmd/knowns

      # Test Linux binary
      - name: Test Linux binary
        run: |
          chmod +x npm/knowns-linux-x64/knowns
          npm/knowns-linux-x64/knowns --version

      # Update versions
      - name: Update package versions
        run: |
          VERSION=${{ inputs.version }}
          for pkg in npm/knowns-*/; do
            cd "$pkg"
            npm version "$VERSION" --no-git-tag-version --allow-same-version
            cd ../..
          done
          cd npm/knowns
          npm version "$VERSION" --no-git-tag-version --allow-same-version
          cd ../..

      # Publish
      - name: Publish platform packages
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          for pkg in npm/knowns-*/; do
            cd "$pkg"
            npm publish --access public || true
            cd ../..
          done

      - name: Publish main package
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          cd npm/knowns
          npm publish --access public
