name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: "Version to publish (e.g., 1.0.0)"
        required: false
        type: string

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
      - uses: oven-sh/setup-bun@v2
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Build UI
        run: cd ui && bun install --frozen-lockfile && bun run build
      - run: go test -v -race ./...
      - run: go vet ./...

  build-ui:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build UI
        run: cd ui && bun install --frozen-lockfile && bun run build

      - uses: actions/upload-artifact@v4
        with:
          name: ui-dist
          path: ui/dist/
          retention-days: 1

  build:
    needs: [test, build-ui]
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: darwin
            goarch: arm64
            npm_pkg: knowns-darwin-arm64
          - goos: darwin
            goarch: amd64
            npm_pkg: knowns-darwin-x64
          - goos: linux
            goarch: arm64
            npm_pkg: knowns-linux-arm64
          - goos: linux
            goarch: amd64
            npm_pkg: knowns-linux-x64
          - goos: windows
            goarch: arm64
            npm_pkg: knowns-win-arm64
          - goos: windows
            goarch: amd64
            npm_pkg: knowns-win-x64

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - name: Download UI dist
        uses: actions/download-artifact@v4
        with:
          name: ui-dist
          path: ui/dist/

      - name: Determine version
        id: version
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            echo "version=${{ inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
          fi

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: '0'
        run: |
          VERSION=${{ steps.version.outputs.version }}
          EXT=""
          if [ "${{ matrix.goos }}" = "windows" ]; then EXT=".exe"; fi
          go build -ldflags "-s -w -X github.com/howznguyen/knowns/internal/util.Version=${VERSION}" \
            -o bin/knowns-${{ matrix.goos }}-${{ matrix.goarch }}${EXT} \
            ./cmd/knowns

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.npm_pkg }}
          path: bin/knowns-*

  publish-npm:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Determine version
        id: version
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            echo "version=${{ inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
          fi

      - name: Prepare npm packages
        run: |
          VERSION=${{ steps.version.outputs.version }}

          # Copy binaries to npm packages
          for dir in artifacts/knowns-*/; do
            pkg=$(basename "$dir")
            # Skip ui-dist artifact
            if [ "$pkg" = "ui-dist" ]; then continue; fi
            binary=$(ls "$dir"/knowns-* 2>/dev/null | head -1)
            if [ -n "$binary" ]; then
              cp "$binary" "npm/$pkg/knowns$(echo "$binary" | grep -o '\.exe$' || true)"
              chmod +x "npm/$pkg/knowns" 2>/dev/null || true
            fi
            # Update version in package.json
            cd "npm/$pkg"
            npm version "$VERSION" --no-git-tag-version
            cd ../..
          done

          # Update main package version
          cd npm/knowns
          npm version "$VERSION" --no-git-tag-version
          cd ../..

      - name: Publish platform packages
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          for pkg in npm/knowns-*/; do
            cd "$pkg"
            npm publish --access public || true
            cd ../..
          done

      - name: Publish main package
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          cd npm/knowns
          npm publish --access public

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create tarballs
        run: |
          mkdir -p release
          for dir in artifacts/knowns-*/; do
            pkg=$(basename "$dir")
            if [ "$pkg" = "ui-dist" ]; then continue; fi
            binary=$(ls "$dir"/knowns-* 2>/dev/null | head -1)
            if [ -n "$binary" ]; then
              BASENAME=$(basename "$binary")
              cp "$binary" "release/$BASENAME"
              cd release
              tar -czvf "${pkg}.tar.gz" "$BASENAME"
              sha256sum "${pkg}.tar.gz" > "${pkg}.tar.gz.sha256"
              rm "$BASENAME"
              cd ..
            fi
          done

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            release/*.tar.gz
            release/*.sha256
          generate_release_notes: true

  homebrew:
    needs: release
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Update Homebrew tap
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          if [ -z "$GH_TOKEN" ]; then
            echo "HOMEBREW_TAP_TOKEN not set, skipping Homebrew update"
            exit 0
          fi

          VERSION=${GITHUB_REF#refs/tags/v}

          # Create tarballs and compute checksums
          for dir in artifacts/knowns-*/; do
            pkg=$(basename "$dir")
            if [ "$pkg" = "ui-dist" ]; then continue; fi
            binary=$(ls "$dir"/knowns-* 2>/dev/null | head -1)
            if [ -n "$binary" ]; then
              BASENAME=$(basename "$binary")
              cp "$binary" "./$BASENAME"
              tar -czvf "${pkg}.tar.gz" "$BASENAME"
              sha256sum "${pkg}.tar.gz" > "${pkg}.tar.gz.sha256"
              rm "$BASENAME"
            fi
          done

          SHA_DARWIN_ARM64=$(cat knowns-darwin-arm64.tar.gz.sha256 | awk '{print $1}')
          SHA_DARWIN_X64=$(cat knowns-darwin-x64.tar.gz.sha256 | awk '{print $1}')
          SHA_LINUX_X64=$(cat knowns-linux-x64.tar.gz.sha256 | awk '{print $1}')

          git clone https://x-access-token:${GH_TOKEN}@github.com/knowns-dev/homebrew-tap.git
          cd homebrew-tap

          cat > Formula/knowns.rb <<'RUBY'
class Knowns < Formula
  desc "The memory layer for AI-native software development"
  homepage "https://knowns.sh"
  license "MIT"

  on_macos do
    on_arm do
      url "PLACEHOLDER_DARWIN_ARM64"
      sha256 "PLACEHOLDER_SHA_DARWIN_ARM64"
    end
    on_intel do
      url "PLACEHOLDER_DARWIN_X64"
      sha256 "PLACEHOLDER_SHA_DARWIN_X64"
    end
  end

  on_linux do
    on_intel do
      url "PLACEHOLDER_LINUX_X64"
      sha256 "PLACEHOLDER_SHA_LINUX_X64"
    end
  end

  def install
    if OS.mac? && Hardware::CPU.arm?
      bin.install "knowns-darwin-arm64" => "knowns"
    elsif OS.mac? && Hardware::CPU.intel?
      bin.install "knowns-darwin-x64" => "knowns"
    elsif OS.linux? && Hardware::CPU.intel?
      bin.install "knowns-linux-x64" => "knowns"
    end
    bin.install_symlink "knowns" => "kn"
  end

  test do
    assert_match version.to_s, shell_output("#{bin}/knowns --version")
  end
end
RUBY

          # Replace placeholders with actual values
          sed -i "s|PLACEHOLDER_DARWIN_ARM64|https://github.com/knowns-dev/knowns/releases/download/v${VERSION}/knowns-darwin-arm64.tar.gz|" Formula/knowns.rb
          sed -i "s|PLACEHOLDER_SHA_DARWIN_ARM64|${SHA_DARWIN_ARM64}|" Formula/knowns.rb
          sed -i "s|PLACEHOLDER_DARWIN_X64|https://github.com/knowns-dev/knowns/releases/download/v${VERSION}/knowns-darwin-x64.tar.gz|" Formula/knowns.rb
          sed -i "s|PLACEHOLDER_SHA_DARWIN_X64|${SHA_DARWIN_X64}|" Formula/knowns.rb
          sed -i "s|PLACEHOLDER_LINUX_X64|https://github.com/knowns-dev/knowns/releases/download/v${VERSION}/knowns-linux-x64.tar.gz|" Formula/knowns.rb
          sed -i "s|PLACEHOLDER_SHA_LINUX_X64|${SHA_LINUX_X64}|" Formula/knowns.rb

          # Insert version after license line
          sed -i "/license \"MIT\"/a\\  version \"${VERSION}\"" Formula/knowns.rb

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/knowns.rb
          git commit -m "Update knowns to v${VERSION}"
          git push

  discord:
    needs: release
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Get version
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Get changelog from Release
        id: changelog
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          CHANGELOG=$(gh release view "v${{ steps.version.outputs.version }}" --repo ${{ github.repository }} --json body -q '.body' 2>/dev/null || echo "")
          CHANGELOG=$(echo "$CHANGELOG" | sed '/^\*\*Full Changelog\*\*:/d')
          if [ -z "$CHANGELOG" ]; then
            CHANGELOG="See full release notes on GitHub."
          fi
          if [ ${#CHANGELOG} -gt 1500 ]; then
            CHANGELOG="${CHANGELOG:0:1500}..."
          fi
          CHANGELOG=$(echo "$CHANGELOG" | jq -Rs .)
          echo "content=$CHANGELOG" >> $GITHUB_OUTPUT

      - name: Send Discord notification
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK_URL }}
          VERSION: ${{ steps.version.outputs.version }}
          CHANGELOG: ${{ steps.changelog.outputs.content }}
        run: |
          if [ -z "$DISCORD_WEBHOOK" ]; then
            echo "Discord webhook not configured, skipping notification"
            exit 0
          fi

          curl -H "Content-Type: application/json" \
            -X POST \
            -d "{
              \"embeds\": [{
                \"title\": \"Knowns CLI v${VERSION} Released!\",
                \"description\": ${CHANGELOG},
                \"color\": 5814783,
                \"fields\": [
                  {
                    \"name\": \"Install/Update\",
                    \"value\": \"\`\`\`bash\n# npm\nnpm install -g knowns@${VERSION}\n\n# brew\nbrew upgrade knowns\n\`\`\`\",
                    \"inline\": false
                  },
                  {
                    \"name\": \"Links\",
                    \"value\": \"[npm](https://www.npmjs.com/package/knowns/v/${VERSION}) | [GitHub Release](https://github.com/knowns-dev/knowns/releases/tag/v${VERSION}) | [Docs](https://knowns.sh/docs)\",
                    \"inline\": false
                  }
                ],
                \"footer\": {
                  \"text\": \"Knowns CLI\"
                },
                \"timestamp\": \"$(date -u +%Y-%m-%dT%H:%M:%SZ)\"
              }]
            }" \
            "$DISCORD_WEBHOOK"
