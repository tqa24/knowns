name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
    types: [opened, synchronize, reopened]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    name: Lint & Test (${{ matrix.os }})
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
      - uses: oven-sh/setup-bun@v2
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install llvm-mingw toolchain
        if: runner.os == 'Windows'
        shell: bash
        run: |
          curl -L --retry 5 --retry-delay 5 \
            -o llvm-mingw.zip \
            "https://github.com/mstorsjo/llvm-mingw/releases/download/20260407/llvm-mingw-20260407-ucrt-x86_64.zip"
          unzip -q llvm-mingw.zip -d "$RUNNER_TEMP/llvm-mingw"
          TOOLCHAIN_DIR=$(find "$RUNNER_TEMP/llvm-mingw" -mindepth 1 -maxdepth 1 -type d | head -n 1)
          if [ -z "$TOOLCHAIN_DIR" ]; then
            echo "Failed to extract llvm-mingw toolchain"
            exit 1
          fi
          echo "$TOOLCHAIN_DIR/bin" >> "$GITHUB_PATH"
          echo "CC=x86_64-w64-mingw32-clang" >> "$GITHUB_ENV"
          echo "CXX=x86_64-w64-mingw32-clang++" >> "$GITHUB_ENV"
          echo "AR=x86_64-w64-mingw32-ar" >> "$GITHUB_ENV"

      - name: Build UI
        run: cd ui && bun install --frozen-lockfile && bun run build

      - name: Run npm installer tests
        if: runner.os == 'Windows'
        run: bun test npm/knowns/install.test.js

      - name: Build Go binary (Unix)
        if: runner.os != 'Windows'
        run: make build

      - name: Build Go binary (Windows)
        if: runner.os == 'Windows'
        env:
          CGO_ENABLED: '1'
        run: go build -ldflags "-s -w -X github.com/howznguyen/knowns/internal/util.Version=${env:GITHUB_SHA}" -o bin/knowns.exe ./cmd/knowns

      - name: Go vet (Unix)
        if: runner.os != 'Windows'
        run: go vet ./...

      - name: Go vet (Windows)
        if: runner.os == 'Windows'
        env:
          CGO_ENABLED: '1'
        run: go vet ./...

      - name: Run tests (Unix)
        if: runner.os != 'Windows'
        run: go test -v -race -count=1 ./...

      - name: Run tests (Windows)
        if: runner.os == 'Windows'
        env:
          CGO_ENABLED: '1'
        run: go test -v -race -count=1 ./...

  sidecar-smoke:
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-15-intel
            target: bun-darwin-x64
            bundle: knowns-embed-darwin-x64
            sidecar_bin: knowns-embed
          - runner: macos-15
            target: bun-darwin-arm64
            bundle: knowns-embed-darwin-arm64
            sidecar_bin: knowns-embed
          - runner: ubuntu-latest
            target: bun-linux-x64
            bundle: knowns-embed-linux-x64
            sidecar_bin: knowns-embed
          - runner: ubuntu-24.04-arm
            target: bun-linux-arm64
            bundle: knowns-embed-linux-arm64
            sidecar_bin: knowns-embed
          - runner: windows-latest
            target: windows-native
            bundle: knowns-embed-win-x64
            sidecar_bin: knowns-embed.exe
    name: Sidecar Smoke (${{ matrix.target }})
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install llvm-mingw toolchain
        if: runner.os == 'Windows'
        shell: bash
        run: |
          curl -L --retry 5 --retry-delay 5 \
            -o llvm-mingw.zip \
            "https://github.com/mstorsjo/llvm-mingw/releases/download/20260407/llvm-mingw-20260407-ucrt-x86_64.zip"
          unzip -q llvm-mingw.zip -d "$RUNNER_TEMP/llvm-mingw"
          TOOLCHAIN_DIR=$(find "$RUNNER_TEMP/llvm-mingw" -mindepth 1 -maxdepth 1 -type d | head -n 1)
          if [ -z "$TOOLCHAIN_DIR" ]; then
            echo "Failed to extract llvm-mingw toolchain"
            exit 1
          fi
          echo "$TOOLCHAIN_DIR/bin" >> "$GITHUB_PATH"
          echo "CC=x86_64-w64-mingw32-clang" >> "$GITHUB_ENV"
          echo "CXX=x86_64-w64-mingw32-clang++" >> "$GITHUB_ENV"
          echo "AR=x86_64-w64-mingw32-ar" >> "$GITHUB_ENV"

      - name: Build sidecar bundle
        if: runner.os != 'Windows'
        run: |
          cd sidecar
          bun install --frozen-lockfile
          bun run build.ts "${{ matrix.target }}"

      - name: Build native Windows sidecar
        if: runner.os == 'Windows'
        shell: bash
        env:
          CGO_ENABLED: '1'
        run: |
          mkdir -p sidecar-smoke
          go build -ldflags "-s -w -H windowsgui -X github.com/howznguyen/knowns/internal/util.Version=${GITHUB_SHA}" -o sidecar-smoke/knowns-embed.exe ./cmd/knowns-embed

      - name: Smoke test sidecar (Unix)
        if: runner.os != 'Windows'
        run: |
          mkdir -p sidecar-smoke
          cp -R "sidecar/dist/${{ matrix.bundle }}"/. sidecar-smoke/
          chmod +x "sidecar-smoke/${{ matrix.sidecar_bin }}"
          bundle_dir="$PWD/sidecar-smoke"
          if [ "$RUNNER_OS" = "macOS" ]; then
            export DYLD_LIBRARY_PATH="$bundle_dir${DYLD_LIBRARY_PATH:+:$DYLD_LIBRARY_PATH}"
            export DYLD_FALLBACK_LIBRARY_PATH="$bundle_dir${DYLD_FALLBACK_LIBRARY_PATH:+:$DYLD_FALLBACK_LIBRARY_PATH}"
          else
            export LD_LIBRARY_PATH="$bundle_dir${LD_LIBRARY_PATH:+:$LD_LIBRARY_PATH}"
          fi
          response=$(printf '{"jsonrpc":"2.0","id":1,"method":"ping","params":{}}\n' | "$bundle_dir/${{ matrix.sidecar_bin }}" 2>&1)
          status=$?
          if [ $status -ne 0 ]; then
            echo "$response"
            exit $status
          fi
          echo "$response" | grep -E '^\{.*\}$' | tail -n 1 | node -e 'const fs=require("fs"); const line=fs.readFileSync(0,"utf8").trim(); if(!line) throw new Error("missing JSON-RPC response"); const parsed=JSON.parse(line); if(!parsed.result?.ok) throw new Error(`unexpected sidecar ping response: ${line}`);'

      - name: Smoke test sidecar (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $sidecar = Resolve-Path "sidecar-smoke/${{ matrix.sidecar_bin }}"
          if (-not (Test-Path $sidecar)) {
            throw "Missing sidecar binary: $sidecar"
          }

          $psi = New-Object System.Diagnostics.ProcessStartInfo
          $psi.FileName = $sidecar
          $psi.UseShellExecute = $false
          $psi.RedirectStandardInput = $true
          $psi.RedirectStandardOutput = $true
          $psi.RedirectStandardError = $true
          $psi.CreateNoWindow = $true

          $proc = New-Object System.Diagnostics.Process
          $proc.StartInfo = $psi
          $proc.Start() | Out-Null
          $proc.StandardInput.WriteLine('{"jsonrpc":"2.0","id":1,"method":"ping","params":{}}')
          $proc.StandardInput.Close()

          $stdout = $proc.StandardOutput.ReadToEnd()
          $stderr = $proc.StandardError.ReadToEnd()
          $proc.WaitForExit()

          if ($proc.ExitCode -ne 0) {
            throw "knowns-embed.exe exited with code $($proc.ExitCode)`nSTDERR:`n$stderr`nSTDOUT:`n$stdout"
          }

          $jsonLine = ($stdout -split "`r?`n") | Where-Object { $_ -match '^\{.*\}$' } | Select-Object -Last 1
          if (-not $jsonLine) {
            throw "knowns-embed.exe did not return a JSON-RPC response`nSTDERR:`n$stderr`nSTDOUT:`n$stdout"
          }

          $parsed = $jsonLine | ConvertFrom-Json
          if (-not $parsed.result.ok) {
            throw "Unexpected sidecar ping response: $jsonLine"
          }

  build-and-e2e:
    runs-on: ubuntu-latest
    needs: [test, sidecar-smoke]
    name: Build & E2E
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
      - uses: oven-sh/setup-bun@v2
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build UI
        run: cd ui && bun install --frozen-lockfile && bun run build

      - name: Build Go binary (with embedded UI)
        run: make build

      - name: Install Playwright browsers
        run: cd ui && bunx playwright install --with-deps chromium

      - name: Verify binary
        run: |
          ./bin/knowns --version
          echo "Build verification passed"

      - name: Build Linux sidecar bundle for semantic tests
        run: |
          cd sidecar
          bun install --frozen-lockfile
          bun run build.ts bun-linux-x64
          cp -R dist/knowns-embed-linux-x64/. ../bin/
          chmod +x ../bin/knowns-embed

      - name: Run E2E tests
        run: |
          (cd tests && go test -v -timeout 300s -count=1 -run TestCLI ./...)
          (cd tests && go test -v -timeout 300s -count=1 -run TestMCP ./...)

      - name: Run semantic CLI subset
        run: cd tests && TEST_SEMANTIC=1 TEST_BINARY=../bin/knowns go test -v -timeout 300s -count=1 -run TestCLI_SemanticSearch ./...

      - name: Run semantic MCP subset
        run: cd tests && TEST_SEMANTIC=1 TEST_BINARY=../bin/knowns go test -v -timeout 300s -count=1 -run 'TestMCP_SemanticSearch/(reindex|keyword_search|hybrid_search|search_docs_only|search_tasks_only)$' ./...

      - name: Run UI Playwright tests
        run: cd ui && TEST_BINARY=../bin/knowns bun test:e2e
